<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <style>
    .weave { stroke: #1A1612; }
    .t { stroke: #B86A1F; }
    .c { stroke: #A8442A; }
    @media (prefers-color-scheme: dark) {
      .weave { stroke: #EFE8DC; }
      .t { stroke: #F5A04A; }
      .c { stroke: #FF6E4F; }
    }
  </style>
  <g class="weave" stroke-linecap="butt" fill="none">
    <line stroke-width="12" x1="0" y1="30" x2="120" y2="30"/>
    <line stroke-width="10" x1="60" y1="0" x2="60" y2="120"/>
    <line stroke-width="12" x1="0" y1="60" x2="120" y2="60"/>
    <line stroke-width="10" x1="30" y1="0" x2="30" y2="120"/>
    <line stroke-width="12" x1="0" y1="90" x2="120" y2="90"/>
  </g>
  <g stroke-width="13" fill="none" stroke-linecap="butt">
    <line class="t" x1="30" y1="30" x2="90" y2="30"/>
    <line class="t" x1="60" y1="30" x2="60" y2="90"/>
    <polyline class="c" points="90,60 30,60 30,90 90,90"/>
  </g>
</svg>
